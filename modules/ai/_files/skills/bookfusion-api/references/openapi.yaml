          type: integer
        url:
          type: string
        types:
          type: array
          items:
            $ref: '#/components/schemas/ContentType'
          description: 'json key: types (contentTypes)'
    UpdateBookRequest:
      type: object
      description: >-
        source: o.whenAnyResultlambda3 (UpdateBookRequest) - sent as multipart 'payload' JSON part; coverFilePath is a local file path, not serialized.
        MERGE SEMANTICS (verified live): an OMITTED field is left unchanged; a SENT scalar (title/summary/language/publisher_name/published_at)
        overwrites; a SENT array (authors/tags/category_ids/bookshelf_ids/lists/series) REPLACES the whole set — e.g. {"bookshelf_ids":[5]} removes
        the book from every other shelf. Clearing a field by omission is impossible; whether [] / "" clears a set is UNVERIFIED. There is NO structured
        `isbn`/identifier field here or in the Book response (confirmed by decompiling the Android app v2.23.8: no `isbn` literal exists in any book
        model, and the app's own update model carries none). The ISBN shown in the *website* editor is a web-only field this mobile API never exposes;
        an ISBN that shows up in this API does so only as free text in `tags`. NOTE: the app's decompiled UpdateBookRequest lists only 8 fields and even
        omits `tags`, yet the server accepts `tags` and (verified) `publisher_name`/`published_at` — so the server accepts a SUPERSET of the app's model.
      properties:
        title:
          type: string
        summary:
          type: string
        language:
          type: string
        publisher_name:
          type: string
          description: 'editable via updateUserBook PATCH — VERIFIED live (probe 2026-07-15: set then restored; omitted fields preserved)'
        published_at:
          type: string
          description: 'publication date; editable via updateUserBook PATCH — VERIFIED live (probe 2026-07-15)'
