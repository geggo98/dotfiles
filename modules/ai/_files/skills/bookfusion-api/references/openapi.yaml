components:
  securitySchemes:
    XToken:
      type: apiKey
      in: header
      name: X-Token
      description: BookFusion auth token; empty when logged out. Obtained via /api/v3/auth/* or /api/v3/signup.
  schemas:
    Book:
      type: object
      description: 'source: o.UnobservedErrorNotifier (BookResponse)'
      properties:
        id:
          type: integer
          format: int64
        number:
          type: integer
          format: int64
        read_time:
          type: integer
          description: 'seconds read; present in real /api/user/books/search responses (absent from the original reverse-engineered spec)'
        title:
          type: string
        summary:
          type: string
        language:
          type: string
        url:
          type: string
          description: 'DECLARED but never observed (0/129 real responses carry `url`). The real reader deep-link is read_url — code against read_url, not url.'
        read_url:
          type: string
          description: 'reader deep-link, e.g. https://reader.bookfusion.com/books/8902995-…?type=pdf; present in real responses, absent from the original spec'
        added_at:
          type: string
        published_at:
          type: string
        updated_at:
          type: string
        last_read_at:
          type: string
        expires_at:
          type: string
        creation_token:
          type: string
        publisher_name:
          type: string
        download_size:
          type: integer
          format: int64
          description: 'json key: download_size'
        bookshelf_book_id:
          type: integer
          format: int64
          description: 'conditional — only present for library/borrowed books, not owned uploads'
        format:
          $ref: '#/components/schemas/BookFormat'
        formats:
          type: array
          description: 'per-format download entries (a book may ship several: AZW3/EPUB/MOBI/PDF); present in real responses, absent from the original spec'
          items:
            type: object
            properties:
              name:
                type: string
              download_size:
                type: integer
                format: int64
              content_type:
                type: string
        type:
          $ref: '#/components/schemas/ContentType'
          description: 'json key: type'
        enhancement_type:
          $ref: '#/components/schemas/BookEnhancementType'
        cover:
          $ref: '#/components/schemas/BookCover'
        authors:
          type: array
          items:
            $ref: '#/components/schemas/Author'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        bookshelves:
          type: array
          items:
            $ref: '#/components/schemas/Bookshelf'
        series:
          type: array
          items:
            $ref: '#/components/schemas/Series'
        tags:
          type: array
          items:
            type: string
        lists:
          type: array
          items:
            $ref: '#/components/schemas/BookListType'
        permissions:
          $ref: '#/components/schemas/BookPermissions'
        reading_position:
          $ref: '#/components/schemas/ReadingPosition'
        source:
          $ref: '#/components/schemas/BookSource'
    Author:
      type: object
      description: 'source: o.Task (Author)'
      properties:
        name:
          type: string
    Category:
      type: object
      description: 'source: o.TaskTaskCompletionSource (toString: BookCategoryResponse). Library/book category.'
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        term:
          type: string
        books_count:
          type: integer
        dc_subjects:
          description: unstructured (Object in source)
        lcc_subjects:
          description: unstructured (Object in source)
        children:
          type: array
          items: {}
          description: nested categories (Object list in source)
    Bookshelf:
      type: object
      description: 'source: o.continueWithTask (BookshelfResponse)'
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        creation_token:
          type: string
        updated_at:
          type: string
        smart:
          type: boolean
    Series:
      type: object
      description: 'source: o.getMacOutputStream (SeriesResponse)'
      properties:
        id:
          type: integer
          format: int64
