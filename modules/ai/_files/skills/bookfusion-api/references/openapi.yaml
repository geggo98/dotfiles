          type: string
          description: 'numeric server-side; a sent "202401" comes back as "202401.0" (compare numerically, not as a string)'
        creation_token:
          type: string
        added_at:
          type: string
        updated_at:
          type: string
    BookCover:
      type: object
      description: 'source: o.r8lambdaQoNVukAwpAmpCBG00KhcvF3aGA (BookCover)'
      properties:
        url:
          type: string
