          items:
            $ref: '#/components/schemas/BookListType'
          description: 'json key: lists (listTypes)'
        series:
          type: array
          items:
            $ref: '#/components/schemas/BookSeriesIndex'
          description: 'json key: series (seriesIndexes)'
    BookSeriesIndex:
