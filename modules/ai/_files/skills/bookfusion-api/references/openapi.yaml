openapi: 3.1.0
info:
  title: BookFusion Mobile API (Reverse-Engineered from Android app v2.23.8)
  version: 0.0.0-reveng-apiversion-10
  summary: Unofficial reconstruction of the private JSON API used by the BookFusion Android reader app.
  description: |-
    UNOFFICIAL / REVERSE-ENGINEERED from the BookFusion Android app (com.bookfusion.android.reader v2.23.8),
    decompiled with jadx. This is the private mobile JSON API (Retrofit2 + Gson) served at https://www.bookfusion.com.
    It is NOT an official, documented, or supported API and can change without notice.

    Auth: send header `X-Token: <token>` (obtained from the /api/v3/auth/* + /api/v3/signup flow).
    The client also sends `X-Device`, `X-Capabilities: direct-upload`, and negotiates the API version via
    `Accept: application/json; api_version=10`.

    Field names/types come from preserved Gson @SerializedName annotations; each schema notes its source obfuscated class.
    Some request/response bodies are inferred where obfuscation hid detail — treat as best-effort.
servers:
  - url: https://www.bookfusion.com
security:
  - XToken: []
tags:
  - name: Auth
  - name: Books
  - name: Bookshelves
  - name: Series
  - name: Highlights
  - name: Libraries
  - name: ReaderPresets
  - name: ReaderSubscription
  - name: Profile
  - name: TTS
  - name: Taxonomy
paths:
  /api/user/books/search:
    post:
      operationId: searchUserBooks
      tags:
        - Books
      summary: Search/list the user's library books (filter, sort, paging).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookSearchRequest'
      responses:
        "200":
          description: Matching books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
      security:
        - XToken: []
  /api/user/books/{id}:
    delete:
      operationId: deleteUserBook
      tags:
        - Books
      summary: Delete a book from the user's library.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Book deleted (empty body)
      security:
        - XToken: []
    patch:
      operationId: updateUserBook
      tags:
        - Books
      summary: 'Update a book''s metadata (multipart: JSON payload + optional cover image).'
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                payload:
                  $ref: '#/components/schemas/UpdateBookRequest'
                cover:
                  type: string
                  format: binary
                  description: >-
                    Cover image (jpg/png). VERIFIED live 2026-07-19: to set/replace a book's cover the
                    image part MUST be named "cover" with an image Content-Type. A part named "file"
                    (below) is silently IGNORED for covers — the request 200s but cover stays null.
                    Payload may be {}. See references/covers.md. CLI: `updateUserBook --cover PATH`.
                file:
                  type: string
                  format: binary
                  description: 'legacy/no-op for covers — server ignores it here; use the "cover" part instead'
              required:
                - payload
      responses:
        "200":
          description: Updated book
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
      security:
        - XToken: []
  /api/user/books/{number}/reading_position:
    get:
      operationId: getBookReadingPosition
      tags:
        - Books
      summary: Get the current reading position for a book.
      parameters:
        - in: path
          name: number
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Reading position
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingPosition'
      security:
        - XToken: []
    post:
      operationId: updateBookReadingPosition
      tags:
        - Books
      summary: Update the reading position for a book.
      parameters:
        - in: path
          name: number
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBookPositionRequest'
      responses:
        "200":
          description: Updated reading position
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingPosition'
      security:
        - XToken: []
  /api/user/uploads/init:
    post:
      operationId: initBookUpload
      tags:
        - Books
      summary: Initialize a direct book file upload; returns upload target URL/params.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadInitRequest'
      responses:
        "200":
          description: Upload initialization result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadInit'
      security:
        - XToken: []
  /api/user/uploads/finalize:
    post:
      operationId: finalizeBookUpload
      tags:
        - Books
      summary: 'Finalize a book upload (multipart: JSON payload + optional cover image); returns the created book.'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                payload:
                  $ref: '#/components/schemas/UploadFinalize'
                file:
                  type: string
                  format: binary
                  description: optional cover image part
              required:
                - payload
      responses:
        "200":
          description: Created/updated book
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
      security:
        - XToken: []
