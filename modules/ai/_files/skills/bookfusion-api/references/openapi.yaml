      security:
        - XToken: []
    post:
      operationId: addBookBookmark
      tags:
        - Books
      summary: Add a bookmark to a library book.
      parameters:
        - in: path
          name: number
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddBookBookmarkRequest'
      responses:
        "200":
          description: Created bookmark
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bookmark'
      security:
        - XToken: []
  /api/v2/library/books/{number}/bookmarks/{id}/delete:
    post:
      operationId: deleteBookBookmark
      tags:
        - Books
      summary: Delete a bookmark from a library book.
      parameters:
        - in: path
          name: number
          required: true
          schema:
            type: integer
            format: int64
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Bookmark deleted (empty body)
      security:
        - XToken: []
  /api/user/libraries/search:
